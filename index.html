        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; overflow: hidden; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .header {
            position: relative;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 2px 10px rgba(212, 168, 83, 0.3);
        }
        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .stats-bar { grid-template-columns: repeat(4, 1fr); }
        }
        .stat-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .main-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .main-section { grid-template-columns: 1fr 1fr; }
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .astaghfir-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 40px rgba(26, 95, 74, 0.4);
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            user-select: none;
        }
        .astaghfir-btn::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0.3;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0; }
        }
        .astaghfir-btn:active { transform: scale(0.92); }
        .btn-text { font-size: 1.5rem; line-height: 1.4; }
        .btn-subtext { font-size: 0.9rem; opacity: 0.8; }
        .btn-counter {
            position: absolute;
            top: -10px; right: -10px;
            background: var(--accent);
            color: var(--bg-dark);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
        }
        .user-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 20px;
            padding: 20px;
        }
        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(45, 138, 110, 0.2);
        }
        .user-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 900;
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(45, 138, 110, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--accent));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .leaderboard-section { margin-bottom: 20px; }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 15px;
            padding-right: 10px;
            border-right: 4px solid var(--accent);
        }
        .leaderboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        @media (min-width: 768px) {
            .leaderboard-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        }
        .leaderboard-grid::-webkit-scrollbar {
            width: 6px;
        }
        .leaderboard-grid::-webkit-scrollbar-track {
            background: rgba(45, 138, 110, 0.1);
            border-radius: 3px;
        }
        .leaderboard-grid::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 3px;
        }
        .leaderboard-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 50px;
        }
        .leaderboard-card.leaderboard-top {
            padding: 12px 14px;
            border: 2px solid var(--accent);
            background: rgba(212, 168, 83, 0.1);
        }
        .leaderboard-card.leaderboard-normal {
            padding: 8px 12px;
            opacity: 0.9;
        }
        .rank-badge {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #333; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #333; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: white; }
        .rank-other { background: var(--bg-card); color: var(--text-secondary); border: 1px solid rgba(45, 138, 110, 0.3); }
        .leaderboard-count { font-size: 1.1rem; font-weight: 900; color: var(--accent); }
        .toast-container {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 46, 34, 0.95);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            animation: toast-in 0.3s ease;
            pointer-events: all;
        }
        @keyframes toast-in {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal h2 { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; }
        .modal p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem; }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(45, 138, 110, 0.3);
            border-radius: 12px;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
        }
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10001;
        }
        .connection-online {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .connection-offline {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        .vibration-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vibration-btn.active { color: var(--accent); border-color: var(--accent); }
        .theme-selector {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(15, 46, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid rgba(45, 138, 110, 0.3);
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .theme-btn:hover {
            transform: scale(1.15);
        }
        .theme-btn.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(212, 168, 83, 0.5);
        }
        .theme-btn::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .theme-btn:hover::after {
            opacity: 1;
        }
        .theme-green { background: linear-gradient(135deg, #1a5f4a, #2d8a6e); }
        .theme-white { background: linear-gradient(135deg, #f5f5f0, #ffffff); border: 2px solid #ccc; }
        .theme-black { background: linear-gradient(135deg, #111111, #333333); }
        .theme-blue { background: linear-gradient(135deg, #0a1520, #2c5f8a); }
    </style>

<body>
    <div class="particles" id="particles"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="connection-status connection-offline" id="connectionStatus">
        <span id="statusText">جاري الاتصال...</span>
    </div>

    <div class="modal-overlay" id="setupModal">
        <div class="modal">
            <h2>🌙 أهلاً بك في تسبيح</h2>
            <p>أدخل اسمك لبدء رحلة الاستغفار</p>
            <div class="input-group">
                <input type="text" id="userNameInput" placeholder="اسمك" maxlength="20" autofocus>
            </div>
            <button class="btn-primary" id="startBtn">ابدأ الاستغفار</button>
        </div>
    </div>

    <button class="vibration-btn active" id="vibrationBtn">📳</button>

    <header class="header">
        <h1>تَسْبِيح</h1>
        <p>سَابِقُوا إِلَى مَغْفِرَةٍ مِنْ رَبِّكُمْ</p>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">📿 استغفار اليوم</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streakCount">0</div>
                <div class="stat-label">🔥 أيام متتالية</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">🏆 الإجمالي</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="globalCount">0</div>
                <div class="stat-label">🌍 العالم</div>
            </div>
        </div>

        <div class="main-section">
            <div class="button-container">
                <button class="astaghfir-btn" id="mainBtn">
                    <span class="btn-text">أَسْتَغْفِرُ<br>اللَّهَ</span>
                    <span class="btn-subtext">اضغط للاستغفار</span>
                    <span class="btn-counter" id="btnCounter">0</span>
                </button>
            </div>

            <div class="user-card">
                <div class="user-header">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <h3 id="userDisplayName">زائر</h3>
                        <p>المستوى: <span id="userLevel">مبتدئ</span></p>
                    </div>
                </div>
                <div class="progress-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem;">
                        <span>تقدم اليوم</span>
                        <span id="progressText">0 / 100</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
                <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div style="text-align: center; padding: 10px; background: rgba(45, 138, 110, 0.1); border-radius: 10px;">
                        <div style="font-size: 1.3rem; font-weight: 900; color: var(--accent);" id="hourlyRate">0</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">في الساعة</div>
                    </div>
                    <div style="text-align: center; padding: 10px; background: rgba(45, 138, 110, 0.1); border-radius: 10px;">
                        <div style="font-size: 1.3rem; font-weight: 900; color: var(--accent);" id="rankPosition">-</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">ترتيبك</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="leaderboard-section">
            <h2 class="section-title">🏆 لوحة المتصدرين - مباشر (<span id="userCount">0</span> مستخدم نشط)</h2>
            <div class="leaderboard-grid" id="leaderboard"></div>
        </div>
    </div>

    <!-- Theme Selector -->
    <div class="theme-selector" id="themeSelector">
        <button class="theme-btn theme-green active" data-theme="green" data-label="أخضر" title="أخضر"></button>
        <button class="theme-btn theme-white" data-theme="white" data-label="أبيض" title="أبيض"></button>
        <button class="theme-btn theme-black" data-theme="black" data-label="أسود" title="أسود"></button>
        <button class="theme-btn theme-blue" data-theme="blue" data-label="أزرق" title="أزرق"></button>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG - Replace with your credentials
        // ============================================
        var firebaseConfig = {
            apiKey: "AIzaSyA-vhEg9EfxdsXcxj19T1y3mR_cJr60VYI",
            authDomain: "mozn-8f9b0.firebaseapp.com",
            databaseURL: "https://mozn-8f9b0-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mozn-8f9b0",
            storageBucket: "mozn-8f9b0.firebasestorage.app",
            messagingSenderId: "242284204464",
            appId: "1:242284204464:web:0de7aab8d9ab862a0d8675"
        };

        var currentUser = null;
        var users = [];
        var vibrationEnabled = true;
        var isOnline = false;
        var db = null;
        var userRef = null;

        var levels = [
            { name: 'مبتدئ', min: 0 },
            { name: 'مُكثر', min: 100 },
            { name: 'مُجتهد', min: 500 },
            { name: 'مُحب', min: 1000 },
            { name: 'مُتقن', min: 5000 },
            { name: 'وَرِع', min: 10000 },
            { name: 'صالح', min: 50000 },
            { name: 'مُتقِي', min: 100000 }
        ];

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            createParticles();
            setupEventListeners();

            // Check if Firebase is configured
            if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
                showToast('⚠️ يرجى إعداد Firebase أولاً');
                document.getElementById('statusText').textContent = 'غير مُعد';
                setupOfflineMode();
                return;
            }

            // Initialize Firebase
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                connectToDatabase();

                // Load saved theme
                loadTheme();

                // Start after 3 seconds - check Firebase first
                setTimeout(function() {
                    checkAndCreateBots(); // Check Firebase then create if needed
                    startBotSimulation(); // Update existing bots only
                }, 3000);
            } catch(e) {
                console.error('Firebase init error:', e);
                showToast('❌ خطأ في Firebase');
                setupOfflineMode();
            }
        }

        function setupEventListeners() {
            document.getElementById('startBtn').addEventListener('click', setupUser);
            document.getElementById('mainBtn').addEventListener('click', addTasbih);
            document.getElementById('mainBtn').addEventListener('touchstart', function(e) { e.preventDefault(); addTasbih(); });

            // Theme switching
            var themeBtns = document.querySelectorAll('.theme-btn');
            themeBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var theme = this.getAttribute('data-theme');
                    setTheme(theme);
                });
            });

            document.getElementById('userNameInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') setupUser();
            });

            document.getElementById('vibrationBtn').addEventListener('click', function() {
                vibrationEnabled = !vibrationEnabled;
                document.getElementById('vibrationBtn').classList.toggle('active', vibrationEnabled);
                showToast(vibrationEnabled ? '✅ الاهتزاز مفعل' : '❌ الاهتزاز معطل');
            });

            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' && !e.repeat && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    addTasbih();
                }
            });
        }

        // ============================================
        // DATABASE CONNECTION
        // ============================================
        function connectToDatabase() {
            var connectedRef = db.ref('.info/connected');
            connectedRef.on('value', function(snap) {
                if (snap.val() === true) {
                    isOnline = true;
                    updateConnectionStatus(true);
                    showToast('✅ متصل بقاعدة البيانات');

                    // Load all users
                    loadUsers();

                    // Check for existing user
                    checkExistingUser();
                } else {
                    isOnline = false;
                    updateConnectionStatus(false);
                }
            });
        }

        function updateConnectionStatus(online) {
            var el = document.getElementById('connectionStatus');
            var text = document.getElementById('statusText');
            if (online) {
                el.className = 'connection-status connection-online';
                text.textContent = 'متصل';
            } else {
                el.className = 'connection-status connection-offline';
                text.textContent = 'غير متصل';
            }
        }

        // ============================================
        // USER MANAGEMENT
        // ============================================
        function setupUser() {
            var name = document.getElementById('userNameInput').value.trim();
            if (!name) {
                showToast('❌ الرجاء إدخال اسمك');
                return;
            }

            var userId = 'user_' + Date.now();
            currentUser = {
                id: userId,
                name: name,
                today_count: 0,
                total_count: 0,
                streak: 1,
                last_date: new Date().toDateString(),
                hourly_count: 0,
                last_hour: new Date().getHours(),
                trend: 'up',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            // Save to Firebase
            if (isOnline && db) {
                db.ref('users/' + userId).set(currentUser);
                userRef = db.ref('users/' + userId);
            }

            // Save locally
            localStorage.setItem('tasbihUser', JSON.stringify(currentUser));

            document.getElementById('setupModal').style.display = 'none';
            updateUI();
            showToast('🌟 أهلاً ' + name + '! ابدأ رحلة الاستغفار');
        }



        function checkExistingUser() {
            var saved = localStorage.getItem('tasbihUser');
            if (saved && isOnline && db) {
                var parsed = JSON.parse(saved);
                db.ref('users/' + parsed.id).once('value', function(snapshot) {
                    var data = snapshot.val();
                    if (data) {
                        currentUser = data;
                        userRef = db.ref('users/' + currentUser.id);
                        document.getElementById('setupModal').style.display = 'none';
                        updateUI();
                        showToast('🌟 مرحباً بعودتك ' + data.name + '!');
                    }
                });
            }
        }

        // ============================================
        // TASBIH FUNCTION
        // ============================================
        function addTasbih() {
            if (!currentUser) {
                document.getElementById('setupModal').style.display = 'flex';
                return;
            }

            // Vibration
            if (vibrationEnabled && navigator.vibrate) {
                navigator.vibrate(15);
            }

            // Update counts
            currentUser.today_count = (currentUser.today_count || 0) + 1;
            currentUser.total_count = (currentUser.total_count || 0) + 1;
            currentUser.hourly_count = (currentUser.hourly_count || 0) + 1;
            currentUser.timestamp = firebase.database.ServerValue.TIMESTAMP;

            // Save to Firebase
            if (isOnline && db) {
                db.ref('users/' + currentUser.id).update({
                    today_count: currentUser.today_count,
                    total_count: currentUser.total_count,
                    hourly_count: currentUser.hourly_count,
                    timestamp: currentUser.timestamp
                });
            }

            // Save locally
            localStorage.setItem('tasbihUser', JSON.stringify(currentUser));

            // Update UI
            updateUI();
            document.getElementById('btnCounter').textContent = currentUser.today_count;

            // Milestones
            if (currentUser.today_count % 10 === 0) {
                var messages = ['🎉 أحسنت! 10 استغفارات','💪 استمر! أنت مُجتهد','✨ بارك الله فيك','🌟 تقترب من الهدف!','🔥 رائع! واصل التقدم'];
                showToast(messages[Math.floor(Math.random() * messages.length)]);
                if (vibrationEnabled && navigator.vibrate) {
                    navigator.vibrate([30, 50, 30]);
                }
            }
        }

        // ============================================
        // DATA LOADING
        // ============================================
        function loadUsers() {
            if (!isOnline || !db) return;

            db.ref('users').on('value', function(snapshot) {
                var data = snapshot.val();
                if (data) {
                    users = Object.keys(data).map(function(key) {
                        return data[key];
                    });
                    updateGlobalCount();
                    renderLeaderboard();
                    if (currentUser) updateUI();
                }
            });
        }

        function updateGlobalCount() {
            var total = users.reduce(function(sum, u) { return sum + (u.today_count || 0); }, 0);
            document.getElementById('globalCount').textContent = total.toLocaleString();
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function updateUI() {
            if (!currentUser) return;

            document.getElementById('todayCount').textContent = currentUser.today_count || 0;
            document.getElementById('streakCount').textContent = currentUser.streak || 1;
            document.getElementById('totalCount').textContent = (currentUser.total_count || 0).toLocaleString();
            document.getElementById('btnCounter').textContent = currentUser.today_count || 0;
            document.getElementById('userDisplayName').textContent = currentUser.name;
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);

            var level = levels[0];
            for (var i = levels.length - 1; i >= 0; i--) {
                if ((currentUser.total_count || 0) >= levels[i].min) {
                    level = levels[i];
                    break;
                }
            }
            document.getElementById('userLevel').textContent = level.name;

            var progress = Math.min(((currentUser.today_count || 0) / 100) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = (currentUser.today_count || 0) + ' / 100';
            document.getElementById('hourlyRate').textContent = currentUser.hourly_count || 0;

            var rank = -1;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === currentUser.id) {
                    rank = i + 1;
                    break;
                }
            }
            document.getElementById('rankPosition').textContent = rank > 0 ? '#' + rank : '-';
        }

        function renderLeaderboard() {
            var container = document.getElementById('leaderboard');
            container.innerHTML = '';

            var sorted = users.slice().sort(function(a, b) {
                return (b.today_count || 0) - (a.today_count || 0);
            });

            for (var i = 0; i < Math.min(sorted.length, 10); i++) {
                var user = sorted[i];
                var rank = i + 1;
                var rankClass = 'rank-other';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                var isCurrent = currentUser && user.id === currentUser.id;

                var card = document.createElement('div');
                card.className = 'leaderboard-card';
                if (isCurrent) card.style.border = '2px solid var(--accent)';

                var displayName = user.name || 'مستخدم';
                var displayStreak = user.streak || 1;
                var displayCount = user.today_count || 0;
                var displayTrend = user.trend || 'up';

                card.innerHTML = '<div class="rank-badge ' + rankClass + '">' + rank + '</div>' +
                    '<div style="flex:1;">' +
                    '<div style="font-weight:700; font-size:1rem;">' + displayName + (isCurrent ? ' 👤' : '') + '</div>' +
                    '<div style="color:var(--text-muted); font-size:0.8rem;">' +
                    '<span>🔥 ' + displayStreak + ' يوم</span>' +
                    '</div></div>' +
                    '<div style="text-align:center;">' +
                    '<div class="leaderboard-count">' + displayCount + '</div>' +
                    '<span style="font-size:0.75rem;">' + (displayTrend === 'up' ? '📈' : '📉') + '</span>' +
                    '</div>';
                container.appendChild(card);
            }
        }

        // ============================================
        // THEME MANAGEMENT
        // ============================================
        function setTheme(theme) {
            var body = document.body;
            var btns = document.querySelectorAll('.theme-btn');

            // Remove all theme classes
            body.classList.remove('theme-white', 'theme-black', 'theme-blue');

            // Add new theme class if not default green
            if (theme !== 'green') {
                body.classList.add('theme-' + theme);
            }

            // Update active button
            btns.forEach(function(btn) {
                btn.classList.remove('active');
                if (btn.getAttribute('data-theme') === theme) {
                    btn.classList.add('active');
                }
            });

            // Save preference
            localStorage.setItem('tasbihTheme', theme);

            // Show toast
            var themeNames = { green: 'أخضر', white: 'أبيض', black: 'أسود', blue: 'أزرق' };
            showToast('🎨 تم تغيير اللون إلى: ' + themeNames[theme]);
        }

        function loadTheme() {
            var savedTheme = localStorage.getItem('tasbihTheme') || 'green';
            setTheme(savedTheme);
        }

        // ============================================
        // BOT SIMULATION - Fake competitors for motivation!
        // ============================================
        var botNames = [
            // Boys names
            'سالم','مبارك','عبدالرحمن','فيصل','بدر','سامي','ناصر','عبدالله','طلال','ماجد',
            'خالد','فهد','سعد','نواف','بندر','تركي','جاسم','هيثم','عمر','يوسف',
            // Girls names
            'نورة','فاطمة','عائشة','سارة','مريم','لولوة','هدى','رنا','دانة','لمار',
            'شيخة','موزة','فجر','الجوهرة','ريم','جواهر','حصة','مها','أمل','هديل'
        ];
        var bots = [];
        var botInterval = null;

        function createBots() {
            // Shuffle and pick 10 random names
            var shuffled = botNames.slice().sort(function() { return 0.5 - Math.random(); });
            var selected = shuffled.slice(0, 10);

            bots = selected.map(function(name, i) {
                return {
                    id: 'bot_' + i + '_' + Date.now(),
                    name: name,
                    today_count: Math.floor(Math.random() * 200) + 20,
                    total_count: Math.floor(Math.random() * 20000) + 500,
                    streak: Math.floor(Math.random() * 15) + 1,
                    trend: 'up',
                    isBot: true,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };
            });

            // Add bots to users array
            bots.forEach(function(bot) {
                var exists = users.find(function(u) { return u.id === bot.id; });
                if (!exists) {
                    users.push(bot);

                    // Save bot to Firebase
                    if (db) {
                        db.ref('users/' + bot.id).set(bot);
                    }
                }
            });

            updateGlobalCount();
            document.getElementById('userCount').textContent = users.length;
            renderLeaderboard();
        }

        function startBotSimulation() {
            if (botInterval) clearInterval(botInterval);

            // Update existing bots based on their level
            botInterval = setInterval(function() {
                if (!isOnline) return;

                // Get current bots
                var currentBots = users.filter(function(u) { 
                    return u.id && u.id.startsWith('bot_'); 
                });

                if (currentBots.length === 0) return;

                // Pick random bot to update
                var randomBot = currentBots[Math.floor(Math.random() * currentBots.length)];
                if (randomBot) {
                    // Add tasbih based on bot level
                    var addAmount = 1;
                    if (randomBot.level === 'high') addAmount = Math.floor(Math.random() * 3) + 2; // 2-4
                    else if (randomBot.level === 'normal') addAmount = Math.floor(Math.random() * 2) + 1; // 1-2
                    else if (randomBot.level === 'medium') addAmount = 1;
                    else if (randomBot.level === 'low') addAmount = Math.random() > 0.5 ? 1 : 0; // 0-1

                    randomBot.today_count = (randomBot.today_count || 0) + addAmount;
                    randomBot.total_count = (randomBot.total_count || 0) + addAmount;
                    randomBot.trend = addAmount > 0 ? 'up' : 'down';

                    // Update in Firebase
                    if (db) {
                        db.ref('users/' + randomBot.id).update({
                            today_count: randomBot.today_count,
                            total_count: randomBot.total_count,
                            trend: randomBot.trend
                        });
                    }
                }
            }, 6000); // Every 6 seconds
        }

        function stopBotSimulation() {
            if (botInterval) {
                clearInterval(botInterval);
                botInterval = null;
            }
        }

        // ============================================
        // OFFLINE MODE
        // ============================================
        function setupOfflineMode() {
            var saved = localStorage.getItem('tasbihUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('setupModal').style.display = 'none';
                updateUI();
            }

            var arabicNames = ['أحمد','محمد','علي','عمر','خالد','فهد','سعد','ناصر','عبدالله','سلطان'];
            users = arabicNames.map(function(name, i) {
                return {
                    id: 'fake_' + i,
                    name: name,
                    today_count: Math.floor(Math.random() * 500) + 50,
                    total_count: Math.floor(Math.random() * 50000) + 1000,
                    streak: Math.floor(Math.random() * 30) + 1,
                    trend: Math.random() > 0.3 ? 'up' : 'down'
                };
            }).sort(function(a, b) { return b.today_count - a.today_count; });

            updateGlobalCount();
            document.getElementById('userCount').textContent = users.length;
            renderLeaderboard();
        }

        // ============================================
        // UTILITIES
        // ============================================
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 20; i++) {
                var particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(particle);
            }
        }

        function showToast(message) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
