<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5f4a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="تسبيح">
    <meta name="description" content="تطبيق تفاعلي للاستغفار والمنافسة بين الأصدقاء">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="icon-72.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">

    <title>تسبيح - تطبيق الاستغفار التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8a6e;
            --accent: #d4a853;
            --bg-dark: #0a1f17;
            --bg-card: #0f2e22;
            --text-primary: #e8f5e9;
            --text-secondary: #a8c5b5;
            --text-muted: #6b9b82;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; overflow: hidden; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .header {
            position: relative;
            z-index: 10;
            padding: 20px;
            text-align: center;
            padding-top: env(safe-area-inset-top, 20px);
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 2px 10px rgba(212, 168, 83, 0.3);
        }
        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .stats-bar { grid-template-columns: repeat(4, 1fr); }
        }
        .stat-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .main-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .main-section { grid-template-columns: 1fr 1fr; }
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .astaghfir-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 40px rgba(26, 95, 74, 0.4), inset 0 -5px 20px rgba(0,0,0,0.2);
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            user-select: none;
        }
        .astaghfir-btn::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0.3;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0; }
        }
        .astaghfir-btn:active { transform: scale(0.92); }
        .btn-text { font-size: 1.5rem; line-height: 1.4; }
        .btn-subtext { font-size: 0.9rem; opacity: 0.8; font-weight: 400; }
        .btn-counter {
            position: absolute;
            top: -10px; right: -10px;
            background: var(--accent);
            color: var(--bg-dark);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
        }
        .user-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 20px;
            padding: 20px;
        }
        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(45, 138, 110, 0.2);
        }
        .user-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 900;
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(45, 138, 110, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--accent));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .leaderboard-section { margin-bottom: 20px; }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 15px;
            padding-right: 10px;
            border-right: 4px solid var(--accent);
        }
        .leaderboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        @media (min-width: 768px) {
            .leaderboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .leaderboard-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rank-badge {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #333; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #333; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: white; }
        .rank-other { background: var(--bg-card); color: var(--text-secondary); border: 1px solid rgba(45, 138, 110, 0.3); }
        .leaderboard-count { font-size: 1.3rem; font-weight: 900; color: var(--accent); }
        .toast-container {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 46, 34, 0.95);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            animation: toast-in 0.3s ease;
            pointer-events: all;
        }
        @keyframes toast-in {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal h2 { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; }
        .modal p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem; }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(45, 138, 110, 0.3);
            border-radius: 12px;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
        }
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 15px 20px;
            z-index: 10001;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 90%;
            width: 350px;
        }
        .install-prompt.show { display: flex; }
        .install-btn {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .dismiss-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .vibration-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vibration-btn.active { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay" id="setupModal">
        <div class="modal">
            <h2>🌙 أهلاً بك في تسبيح</h2>
            <p>أدخل اسمك لبدء رحلة الاستغفار</p>
            <div class="input-group">
                <input type="text" id="userNameInput" placeholder="اسمك" maxlength="20" autofocus>
            </div>
            <button class="btn-primary" id="startBtn">ابدأ الاستغفار</button>
        </div>
    </div>

    <div class="install-prompt" id="installPrompt">
        <span>📲 ثبت التطبيق على شاشتك الرئيسية</span>
        <button class="install-btn" id="installBtn">تثبيت</button>
        <button class="dismiss-btn" id="dismissBtn">✕</button>
    </div>

    <button class="vibration-btn" id="vibrationBtn">📳</button>

    <header class="header">
        <h1>تَسْبِيح</h1>
        <p>سَابِقُوا إِلَى مَغْفِرَةٍ مِنْ رَبِّكُمْ</p>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">📿 استغفار اليوم</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streakCount">0</div>
                <div class="stat-label">🔥 أيام متتالية</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">🏆 الإجمالي</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="globalCount">12,847</div>
                <div class="stat-label">🌍 العالم</div>
            </div>
        </div>

        <div class="main-section">
            <div class="button-container">
                <button class="astaghfir-btn" id="mainBtn">
                    <span class="btn-text">أَسْتَغْفِرُ<br>اللَّهَ</span>
                    <span class="btn-subtext">اضغط للاستغفار</span>
                    <span class="btn-counter" id="btnCounter">0</span>
                </button>
            </div>

            <div class="user-card">
                <div class="user-header">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <h3 id="userDisplayName">زائر</h3>
                        <p>المستوى: <span id="userLevel">مبتدئ</span></p>
                    </div>
                </div>
                <div class="progress-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem;">
                        <span>تقدم اليوم</span>
                        <span id="progressText">0 / 100</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
                <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div style="text-align: center; padding: 10px; background: rgba(45, 138, 110, 0.1); border-radius: 10px;">
                        <div style="font-size: 1.3rem; font-weight: 900; color: var(--accent);" id="hourlyRate">0</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">في الساعة</div>
                    </div>
                    <div style="text-align: center; padding: 10px; background: rgba(45, 138, 110, 0.1); border-radius: 10px;">
                        <div style="font-size: 1.3rem; font-weight: 900; color: var(--accent);" id="rankPosition">-</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">ترتيبك</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="leaderboard-section">
            <h2 class="section-title">🏆 لوحة المتصدرين</h2>
            <div class="leaderboard-grid" id="leaderboard"></div>
        </div>
    </div>

    <script>
        var currentUser = null;
        var users = [];
        var deferredPrompt = null;
        var vibrationEnabled = true;

        var levels = [
            { name: 'مبتدئ', min: 0 },
            { name: 'مُكثر', min: 100 },
            { name: 'مُجتهد', min: 500 },
            { name: 'مُحب', min: 1000 },
            { name: 'مُتقن', min: 5000 },
            { name: 'وَرِع', min: 10000 },
            { name: 'صالح', min: 50000 },
            { name: 'مُتقِي', min: 100000 }
        ];
        var arabicNames = ['أحمد','محمد','علي','عمر','خالد','فهد','سعد','ناصر','عبدالله','سلطان','يوسف','إبراهيم','نواف','بندر','تركي'];

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js')
                    .then(function(registration) {
                        console.log('SW registered');
                    })
                    .catch(function(error) {
                        console.log('SW registration failed');
                    });
            });
        }

        // Install Prompt
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(function() {
                document.getElementById('installPrompt').classList.add('show');
            }, 3000);
        });

        function init() {
            createParticles();
            loadData();

            var modal = document.getElementById('setupModal');
            var startBtn = document.getElementById('startBtn');
            var mainBtn = document.getElementById('mainBtn');
            var nameInput = document.getElementById('userNameInput');
            var installBtn = document.getElementById('installBtn');
            var dismissBtn = document.getElementById('dismissBtn');
            var vibrationBtn = document.getElementById('vibrationBtn');

            startBtn.addEventListener('click', setupUser);
            mainBtn.addEventListener('click', addTasbih);
            mainBtn.addEventListener('touchstart', function(e) { e.preventDefault(); addTasbih(); });

            nameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') setupUser();
            });

            installBtn.addEventListener('click', function() {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(function() {
                        document.getElementById('installPrompt').classList.remove('show');
                        deferredPrompt = null;
                    });
                }
            });

            dismissBtn.addEventListener('click', function() {
                document.getElementById('installPrompt').classList.remove('show');
            });

            vibrationBtn.addEventListener('click', function() {
                vibrationEnabled = !vibrationEnabled;
                vibrationBtn.classList.toggle('active', vibrationEnabled);
                showToast(vibrationEnabled ? '✅ الاهتزاز مفعل' : '❌ الاهتزاز معطل');
            });

            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' && !e.repeat && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    addTasbih();
                }
            });

            if (!currentUser) {
                modal.style.display = 'flex';
            } else {
                modal.style.display = 'none';
                updateUI();
            }

            setInterval(simulateActivity, 8000);
        }

        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 20; i++) {
                var particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(particle);
            }
        }

        function loadData() {
            var saved = localStorage.getItem('tasbihData');
            if (saved) {
                var data = JSON.parse(saved);
                currentUser = data.currentUser;
                users = data.users || generateFakeUsers();
            } else {
                users = generateFakeUsers();
            }
        }

        function saveData() {
            localStorage.setItem('tasbihData', JSON.stringify({ currentUser: currentUser, users: users }));
        }

        function generateFakeUsers() {
            var fakeUsers = [];
            for (var i = 0; i < arabicNames.length; i++) {
                fakeUsers.push({
                    id: i + 1,
                    name: arabicNames[i],
                    todayCount: Math.floor(Math.random() * 500) + 50,
                    totalCount: Math.floor(Math.random() * 50000) + 1000,
                    streak: Math.floor(Math.random() * 30) + 1,
                    trend: Math.random() > 0.3 ? 'up' : 'down'
                });
            }
            return fakeUsers.sort(function(a, b) { return b.todayCount - a.todayCount; });
        }

        function setupUser() {
            var nameInput = document.getElementById('userNameInput');
            var name = nameInput.value.trim();
            if (!name) {
                showToast('❌ الرجاء إدخال اسمك');
                return;
            }

            currentUser = {
                id: Date.now(),
                name: name,
                todayCount: 0,
                totalCount: 0,
                streak: 1,
                lastDate: new Date().toDateString(),
                hourlyCount: 0,
                lastHour: new Date().getHours()
            };
            users.push(currentUser);

            document.getElementById('setupModal').style.display = 'none';

            saveData();
            updateUI();
            showToast('🌟 أهلاً ' + name + '! ابدأ رحلة الاستغفار');
        }

        function addTasbih() {
            if (!currentUser) {
                document.getElementById('setupModal').style.display = 'flex';
                return;
            }

            // Vibration feedback
            if (vibrationEnabled && navigator.vibrate) {
                navigator.vibrate(15);
            }

            currentUser.todayCount++;
            currentUser.totalCount++;
            currentUser.hourlyCount++;

            var globalEl = document.getElementById('globalCount');
            var global = parseInt(globalEl.textContent.replace(/,/g, ''));
            globalEl.textContent = (global + 1).toLocaleString();

            var userIndex = -1;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === currentUser.id) {
                    userIndex = i;
                    break;
                }
            }
            if (userIndex >= 0) {
                users[userIndex].todayCount = currentUser.todayCount;
                users[userIndex].totalCount = currentUser.totalCount;
            }

            saveData();
            updateUI();

            document.getElementById('btnCounter').textContent = currentUser.todayCount;

            if (currentUser.todayCount % 10 === 0) {
                var messages = ['🎉 أحسنت! 10 استغفارات','💪 استمر! أنت مُجتهد','✨ بارك الله فيك','🌟 تقترب من الهدف!','🔥 رائع! واصل التقدم'];
                showToast(messages[Math.floor(Math.random() * messages.length)]);
                if (vibrationEnabled && navigator.vibrate) {
                    navigator.vibrate([30, 50, 30]);
                }
            }
        }

        function updateUI() {
            if (!currentUser) return;
            document.getElementById('todayCount').textContent = currentUser.todayCount;
            document.getElementById('streakCount').textContent = currentUser.streak;
            document.getElementById('totalCount').textContent = currentUser.totalCount.toLocaleString();
            document.getElementById('btnCounter').textContent = currentUser.todayCount;
            document.getElementById('userDisplayName').textContent = currentUser.name;
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);

            var level = levels[0];
            for (var i = levels.length - 1; i >= 0; i--) {
                if (currentUser.totalCount >= levels[i].min) {
                    level = levels[i];
                    break;
                }
            }
            document.getElementById('userLevel').textContent = level.name;

            var progress = Math.min((currentUser.todayCount / 100) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = currentUser.todayCount + ' / 100';
            document.getElementById('hourlyRate').textContent = currentUser.hourlyCount;

            var sorted = users.slice().sort(function(a, b) { return b.todayCount - a.todayCount; });
            var rank = -1;
            for (var i = 0; i < sorted.length; i++) {
                if (sorted[i].id === currentUser.id) {
                    rank = i + 1;
                    break;
                }
            }
            document.getElementById('rankPosition').textContent = rank > 0 ? '#' + rank : '-';

            renderLeaderboard(sorted);
        }

        function renderLeaderboard(sortedUsers) {
            var container = document.getElementById('leaderboard');
            container.innerHTML = '';
            for (var i = 0; i < Math.min(sortedUsers.length, 10); i++) {
                var user = sortedUsers[i];
                var rank = i + 1;
                var rankClass = 'rank-other';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                var isCurrent = user.id === currentUser.id;

                var card = document.createElement('div');
                card.className = 'leaderboard-card';
                if (isCurrent) card.style.border = '2px solid var(--accent)';

                card.innerHTML = '<div class="rank-badge ' + rankClass + '">' + rank + '</div>' +
                    '<div style="flex:1;">' +
                    '<div style="font-weight:700; font-size:1rem;">' + user.name + (isCurrent ? ' 👤' : '') + '</div>' +
                    '<div style="color:var(--text-muted); font-size:0.8rem;">' +
                    '<span>🔥 ' + user.streak + ' يوم</span>' +
                    '</div></div>' +
                    '<div style="text-align:center;">' +
                    '<div class="leaderboard-count">' + user.todayCount + '</div>' +
                    '<span style="font-size:0.75rem;">' + (user.trend === 'up' ? '📈' : '📉') + '</span>' +
                    '</div>';
                container.appendChild(card);
            }
        }

        function simulateActivity() {
            var randomIndex = Math.floor(Math.random() * users.length);
            var randomUser = users[randomIndex];
            if (randomUser && currentUser && randomUser.id !== currentUser.id) {
                randomUser.todayCount += Math.floor(Math.random() * 3) + 1;
                randomUser.trend = Math.random() > 0.4 ? 'up' : 'down';
                var globalEl = document.getElementById('globalCount');
                var global = parseInt(globalEl.textContent.replace(/,/g, ''));
                globalEl.textContent = (global + Math.floor(Math.random() * 10) + 1).toLocaleString();
                saveData();
                updateUI();
            }
        }

        function showToast(message) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
