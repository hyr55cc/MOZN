<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5f4a">
    <title>تسبيح - تطبيق الاستغفار التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8a6e;
            --accent: #d4a853;
            --bg-dark: #0a1f17;
            --bg-card: #0f2e22;
            --text-primary: #e8f5e9;
            --text-secondary: #a8c5b5;
            --text-muted: #6b9b82;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; overflow: hidden; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .header {
            position: relative;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 2px 10px rgba(212, 168, 83, 0.3);
        }
        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .stats-bar { grid-template-columns: repeat(4, 1fr); }
        }
        .stat-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .main-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .main-section { grid-template-columns: 1fr 1fr; }
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .astaghfir-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 40px rgba(26, 95, 74, 0.4);
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            user-select: none;
        }
        .astaghfir-btn::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0.3;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0; }
        }
        .astaghfir-btn:active { transform: scale(0.92); }
        .btn-text { font-size: 1.5rem; line-height: 1.4; }
        .btn-subtext { font-size: 0.9rem; opacity: 0.8; }
        .btn-counter {
            position: absolute;
            top: -10px; right: -10px;
            background: var(--accent);
            color: var(--bg-dark);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
        }
        .user-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 20px;
            padding: 20px;
        }
        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(45, 138, 110, 0.2);
        }
        .user-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 900;
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(45, 138, 110, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--accent));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .leaderboard-section { margin-bottom: 20px; }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 15px;
            padding-right: 10px;
            border-right: 4px solid var(--accent);
        }
        .leaderboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        @media (min-width: 768px) {
            .leaderboard-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        }
        .leaderboard-grid::-webkit-scrollbar {
            width: 6px;
        }
        .leaderboard-grid::-webkit-scrollbar-track {
            background: rgba(45, 138, 110, 0.1);
            border-radius: 3px;
        }
        .leaderboard-grid::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 3px;
        }
        .leaderboard-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 50px;
        }
        .leaderboard-card.leaderboard-top {
            border: 2px solid var(--accent);
            background: rgba(212, 168, 83, 0.1);
        }
        .leaderboard-card.leaderboard-normal {
            opacity: 0.9;
        }
        .leaderboard-card.current-user {
            border: 2px solid var(--accent) !important;
            background: rgba(212, 168, 83, 0.15) !important;
            box-shadow: 0 0 15px rgba(212, 168, 83, 0.3);
        }
        .leaderboard-card.current-user .user-name {
            color: var(--accent) !important;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(212, 168, 83, 0.5);
        }

        /* Flash effect - white light */
        @keyframes flash-active {
            0% { background: rgba(255, 255, 255, 0.9); box-shadow: 0 0 30px rgba(255, 255, 255, 0.8); border-color: #fff; }
            50% { background: rgba(255, 255, 255, 1); box-shadow: 0 0 50px rgba(255, 255, 255, 1); border-color: #fff; }
            100% { background: rgba(15, 46, 34, 0.85); box-shadow: 0 0 15px rgba(45, 138, 110, 0.3); border-color: rgba(45, 138, 110, 0.2); }
        }
        .leaderboard-card.flash-active {
            animation: flash-active 0.6s ease-out;
        }

        /* Pulse effect for counter increase */
        @keyframes pulse-count {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #fff; }
            100% { transform: scale(1); }
        }
        .pulse-count {
            animation: pulse-count 0.3s ease-out;
        }
        .rank-badge {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #333; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #333; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: white; }
        .rank-other { background: var(--bg-card); color: var(--text-secondary); border: 1px solid rgba(45, 138, 110, 0.3); }
        .leaderboard-count { font-size: 1.1rem; font-weight: 900; color: var(--accent); }
        .toast-container {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 46, 34, 0.95);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            animation: toast-in 0.3s ease;
            pointer-events: all;
        }
        @keyframes toast-in {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal h2 { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; }
        .modal p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem; }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(45, 138, 110, 0.3);
            border-radius: 12px;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
        }
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10001;
        }
        .connection-online {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .connection-offline {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        .vibration-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vibration-btn.active { color: var(--accent); border-color: var(--accent); }
        .theme-selector {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(15, 46, 34, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid rgba(45, 138, 110, 0.3);
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .theme-btn:hover { transform: scale(1.15); }
        .theme-btn.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(212, 168, 83, 0.5);
        }
        .theme-green { background: linear-gradient(135deg, #1a5f4a, #2d8a6e); }
        .theme-white { background: linear-gradient(135deg, #f5f5f0, #ffffff); border: 2px solid #ccc; }
        .theme-black { background: linear-gradient(135deg, #111111, #333333); }
        .theme-blue { background: linear-gradient(135deg, #0a1520, #2c5f8a); }
    </style>

        var vibrationEnabled = true;

        var db = null;

        var levels = [

        var botConfigs = [
            { name: 'سالم', level: 'high', minCount: 400, maxCount: 600, speed: 3000 },
            { name: 'نورة', level: 'high', minCount: 400, maxCount: 600, speed: 3500 },

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            createParticles();
            setupEventListeners();

            if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
                showToast('⚠️ يرجى إعداد Firebase');
                document.getElementById('statusText').textContent = 'غير مُعد';
                return;
            }

            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                connectToDatabase();
            } catch(e) {
                console.error('Firebase error:', e);
                showToast('❌ خطأ في الاتصال');
            }
        }

        function setupEventListeners() {
            document.getElementById('startBtn').addEventListener('click', setupUser);
            document.getElementById('mainBtn').addEventListener('click', addTasbih);
            document.getElementById('mainBtn').addEventListener('touchstart', function(e) { e.preventDefault(); addTasbih(); });

            document.getElementById('userNameInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') setupUser();
            });

            document.getElementById('vibrationBtn').addEventListener('click', function() {
                vibrationEnabled = !vibrationEnabled;
                document.getElementById('vibrationBtn').classList.toggle('active', vibrationEnabled);
                showToast(vibrationEnabled ? '✅ الاهتزاز مفعل' : '❌ الاهتزاز معطل');
            });

            // Theme switching
            var themeBtns = document.querySelectorAll('.theme-btn');
            themeBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var theme = this.getAttribute('data-theme');
                    setTheme(theme);
                });
            });

            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' && !e.repeat && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    addTasbih();
                }
            });
        }

        // ============================================
        // THEME MANAGEMENT
        // ============================================
        function setTheme(theme) {
            var body = document.body;
            var btns = document.querySelectorAll('.theme-btn');

            body.classList.remove('theme-white', 'theme-black', 'theme-blue');
            if (theme !== 'green') body.classList.add('theme-' + theme);

            btns.forEach(function(btn) {
                btn.classList.remove('active');
                if (btn.getAttribute('data-theme') === theme) btn.classList.add('active');
            });

            localStorage.setItem('tasbihTheme', theme);
            var themeNames = { green: 'أخضر', white: 'أبيض', black: 'أسود', blue: 'أزرق' };
            showToast('🎨 تم تغيير اللون إلى: ' + themeNames[theme]);
        }

        function loadTheme() {
            var savedTheme = localStorage.getItem('tasbihTheme') || 'green';
            setTheme(savedTheme);
        }

        // ============================================
        // DATABASE CONNECTION
        // ============================================
        function connectToDatabase() {
            var connectedRef = db.ref('.info/connected');
            connectedRef.on('value', function(snap) {
                if (snap.val() === true) {
                    isOnline = true;
                    updateConnectionStatus(true);
                    loadUsers();
                    checkExistingUser();
                    loadTheme();
                } else {
                    isOnline = false;
                    updateConnectionStatus(false);
                }
            });
        }

        function updateConnectionStatus(online) {
            var el = document.getElementById('connectionStatus');
            var text = document.getElementById('statusText');
            if (online) {
                el.className = 'connection-status connection-online';
                text.textContent = 'متصل';
            } else {
                el.className = 'connection-status connection-offline';
                text.textContent = 'غير متصل';
            }
        }

        // ============================================
        // BOT MANAGEMENT
        // ============================================
        function createBots() {
            if (!db) {
                console.log('No DB connection');
                return;
            }

            console.log('Creating bots...');
            showToast('🤖 جاري إنشاء البوتات...');

            // Remove old bots from local array
            users = users.filter(function(u) { return !u.id || !u.id.startsWith('bot_'); });

            // Create 12 fresh bots
            var now = Date.now();
            for (var i = 0; i < botConfigs.length; i++) {
                var config = botConfigs[i];
                var initialCount = Math.floor(Math.random() * (config.maxCount - config.minCount + 1)) + config.minCount;

                var bot = {
                    id: 'bot_' + i + '_' + now,
                    name: config.name,
                    today_count: initialCount,
                    total_count: initialCount * 10,
                    streak: Math.floor(Math.random() * 20) + 1,
                    trend: 'up',
                    level: config.level,
                    isBot: true,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };

                users.push(bot);

                // Save to Firebase
                if (db) {
                    db.ref('users/' + bot.id).set(bot);
                }
            }

            console.log('Created 12 bots');
            showToast('✅ 12 بوت جاهزين!');

            // Start simulation
            startBotSimulation();
        }

        function startBotSimulation() {
            // Use recursive setTimeout instead of setInterval (more reliable)
            function botLoop() {
                if (!isOnline || !db) {
                    setTimeout(botLoop, 5000);
                    return;
                }

                // Pick random bot
                var botIndex = Math.floor(Math.random() * botConfigs.length);
                var config = botConfigs[botIndex];

                // Find bot
                var bot = null;
                for (var i = 0; i < users.length; i++) {
                    if (users[i].id && users[i].id.indexOf('bot_' + botIndex + '_') === 0) {
                        bot = users[i];
                        break;
                    }
                }

                if (bot) {
                    // Calculate add amount
                    var addAmount = 1;
                    if (config.level === 'high') addAmount = Math.floor(Math.random() * 3) + 2;
                    else if (config.level === 'normal') addAmount = Math.floor(Math.random() * 2) + 1;
                    else if (config.level === 'medium') addAmount = 1;
                    else if (config.level === 'low') addAmount = Math.random() > 0.7 ? 1 : 0;

                    if (addAmount > 0) {
                        bot.today_count = (bot.today_count || 0) + addAmount;
                        bot.total_count = (bot.total_count || 0) + addAmount;
                        bot.trend = 'up';

                        // Flash the bot's card
                        flashUserCard(bot.id);

                        db.ref('users/' + bot.id).update({
                            today_count: bot.today_count,
                            total_count: bot.total_count,
                            trend: bot.trend
                        });
                    }
                }

                // Schedule next update (random delay between 2-5 seconds)
                var nextDelay = Math.floor(Math.random() * 3000) + 2000;
                setTimeout(botLoop, nextDelay);
            }

            // Start the loop
            botLoop();
            console.log('Bot simulation started (recursive)');
        }

        // ============================================
        // USER MANAGEMENT
        // ============================================
        function setupUser() {
            var name = document.getElementById('userNameInput').value.trim();
            if (!name) {
                showToast('❌ الرجاء إدخال اسمك');
                return;
            }

            var userId = 'user_' + Date.now();
            currentUser = {
                id: userId,
                name: name,
                today_count: 0,
                total_count: 0,
                streak: 1,
                last_date: new Date().toDateString(),
                hourly_count: 0,
                last_hour: new Date().getHours(),
                trend: 'up',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            if (isOnline && db) {
                db.ref('users/' + userId).set(currentUser);
            }

            localStorage.setItem('tasbihUser', JSON.stringify(currentUser));

            document.getElementById('setupModal').style.display = 'none';
            updateUI();
            showToast('🌟 أهلاً ' + name + '!');
        }

        function checkExistingUser() {
            var saved = localStorage.getItem('tasbihUser');
            if (saved && isOnline && db) {
                var parsed = JSON.parse(saved);
                db.ref('users/' + parsed.id).once('value', function(snapshot) {
                    var data = snapshot.val();
                    if (data) {
                        currentUser = data;
                        document.getElementById('setupModal').style.display = 'none';
                        updateUI();
                        showToast('🌟 مرحباً بعودتك ' + data.name + '!');
                    }
                });
            }
        }

        // ============================================
        // TASBIH FUNCTION
        // ============================================
        function addTasbih() {
            if (!currentUser) {
                document.getElementById('setupModal').style.display = 'flex';
                return;
            }

            if (vibrationEnabled && navigator.vibrate) navigator.vibrate(15);

            currentUser.today_count = (currentUser.today_count || 0) + 1;
            currentUser.total_count = (currentUser.total_count || 0) + 1;
            currentUser.hourly_count = (currentUser.hourly_count || 0) + 1;

            if (isOnline && db) {
                db.ref('users/' + currentUser.id).update({
                    today_count: currentUser.today_count,
                    total_count: currentUser.total_count,
                    hourly_count: currentUser.hourly_count
                });
            }

            localStorage.setItem('tasbihUser', JSON.stringify(currentUser));

            updateUI();
            document.getElementById('btnCounter').textContent = currentUser.today_count;

            if (currentUser.today_count % 10 === 0) {
                var messages = ['🎉 أحسنت! 10 استغفارات','💪 استمر!','✨ بارك الله فيك','🌟 رائع!','🔥 واصل!'];
                showToast(messages[Math.floor(Math.random() * messages.length)]);
                if (vibrationEnabled && navigator.vibrate) navigator.vibrate([30, 50, 30]);
            }
        }

        // ============================================
        // DATA LOADING
        // ============================================
        // Store previous counts to detect changes (global variable)
        var previousCounts = {};

        function loadUsers() {
            if (!isOnline || !db) return;

            db.ref('users').on('value', function(snapshot) {
                var data = snapshot.val();
                if (data) {
                    var newUsers = Object.keys(data).map(function(key) {
                        return data[key];
                    });

                    // Check for count changes and flash cards
                    newUsers.forEach(function(user) {
                        var userId = user.id;
                        var newCount = user.today_count || 0;
                        var oldCount = previousCounts[userId] || 0;

                        // If count increased, flash the card
                        if (newCount > oldCount && oldCount > 0) {
                            flashUserCard(userId);
                        }

                        // Update previous count
                        previousCounts[userId] = newCount;
                    });

                    users = newUsers;

                    // Sort by today_count descending
                    users.sort(function(a, b) {
                        return (b.today_count || 0) - (a.today_count || 0);
                    });

                    updateGlobalCount();
                    document.getElementById('userCount').textContent = users.length;
                    renderLeaderboard();
                    if (currentUser) updateUI();
                }
            });
        }

        function updateGlobalCount() {
            var total = users.reduce(function(sum, u) { return sum + (u.today_count || 0); }, 0);
            document.getElementById('globalCount').textContent = total.toLocaleString();
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function updateUI() {
            if (!currentUser) return;

            document.getElementById('todayCount').textContent = currentUser.today_count || 0;
            document.getElementById('streakCount').textContent = currentUser.streak || 1;
            document.getElementById('totalCount').textContent = (currentUser.total_count || 0).toLocaleString();
            document.getElementById('btnCounter').textContent = currentUser.today_count || 0;
            document.getElementById('userDisplayName').textContent = currentUser.name;
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);

            var level = levels[0];
            for (var i = levels.length - 1; i >= 0; i--) {
                if ((currentUser.total_count || 0) >= levels[i].min) {
                    level = levels[i];
                    break;
                }
            }
            document.getElementById('userLevel').textContent = level.name;

            var progress = Math.min(((currentUser.today_count || 0) / 100) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = (currentUser.today_count || 0) + ' / 100';
            document.getElementById('hourlyRate').textContent = currentUser.hourly_count || 0;

            // Calculate rank from SORTED users
            var rank = -1;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === currentUser.id) {
                    rank = i + 1;
                    break;
                }
            }
            document.getElementById('rankPosition').textContent = rank > 0 ? '#' + rank : '-';

            renderLeaderboard();
        }

        function renderLeaderboard() {
            var container = document.getElementById('leaderboard');
            container.innerHTML = '';

            // Show ALL users
            for (var i = 0; i < users.length; i++) {
                var user = users[i];
                var rank = i + 1;
                var isTop10 = rank <= 10;
                var rankClass = 'rank-other';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                var isCurrent = currentUser && user.id === currentUser.id;
                var isBot = user.id && user.id.startsWith('bot_');

                var displayName = user.name || 'مستخدم';
                var displayStreak = user.streak || 1;
                var displayCount = user.today_count || 0;
                var displayTrend = user.trend || 'up';

                var card = document.createElement('div');
                card.id = 'user-card-' + user.id; // Unique ID for each card

                // Base class
                if (isTop10) {
                    card.className = 'leaderboard-card leaderboard-top';
                } else {
                    card.className = 'leaderboard-card leaderboard-normal';
                }

                // Highlight current user
                if (isCurrent) {
                    card.classList.add('current-user');
                }

                var botIndicator = isBot ? ' 🤖' : '';
                var currentIndicator = isCurrent ? ' 👤' : '';

                // Name styling - highlight current user
                var nameClass = isCurrent ? 'user-name' : '';
                var nameStyle = isCurrent ? 'color:var(--accent);font-weight:900;text-shadow:0 0 10px rgba(212,168,83,0.5);' : '';

                card.innerHTML = '<div class="rank-badge ' + rankClass + '">' + rank + '</div>' +
                    '<div style="flex:1;">' +
                    '<div class="' + nameClass + '" style="font-weight:700; font-size:0.95rem;' + nameStyle + '">' + displayName + botIndicator + currentIndicator + '</div>' +
                    '<div style="color:var(--text-muted); font-size:0.75rem;">' +
                    '<span>🔥 ' + displayStreak + ' يوم</span>' +
                    '</div></div>' +
                    '<div style="text-align:center;">' +
                    '<div class="leaderboard-count" id="count-' + user.id + '">' + displayCount + '</div>' +
                    '<span style="font-size:0.7rem;">' + (displayTrend === 'up' ? '📈' : '📉') + '</span>' +
                    '</div>';
                container.appendChild(card);
            }
        }

        // Function to flash a user's card when they add tasbih
        function flashUserCard(userId) {
            if (!userId) return;

            var card = document.getElementById('user-card-' + userId);
            var countEl = document.getElementById('count-' + userId);

            if (card) {
                // Remove existing flash first
                card.classList.remove('flash-active');
                // Force reflow
                void card.offsetWidth;
                // Add flash class
                card.classList.add('flash-active');

                // Remove after animation
                setTimeout(function() {
                    if (card) card.classList.remove('flash-active');
                }, 600);
            }

            if (countEl) {
                // Pulse the counter
                countEl.classList.remove('pulse-count');
                void countEl.offsetWidth;
                countEl.classList.add('pulse-count');

                setTimeout(function() {
                    if (countEl) countEl.classList.remove('pulse-count');
                }, 300);
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 20; i++) {
                var particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(particle);
            }
        }

        function showToast(message) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        window.addEventListener('load', init);
    </script>
</body>
