<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5f4a">
    <title>تسبيح - تطبيق الاستغفار التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8a6e;
            --accent: #d4a853;
            --bg-dark: #0a1f17;
            --bg-card: #0f2e22;
            --text-primary: #e8f5e9;
            --text-secondary: #a8c5b5;
            --text-muted: #6b9b82;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; overflow: hidden; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .header {
            position: relative;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 2px 10px rgba(212, 168, 83, 0.3);
        }
        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .stats-bar { grid-template-columns: repeat(4, 1fr); }
        }
        .stat-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .main-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .main-section { grid-template-columns: 1fr 1fr; }
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .astaghfir-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 40px rgba(26, 95, 74, 0.4);
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            user-select: none;
        }
        .astaghfir-btn::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0.3;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0; }
        }
        .astaghfir-btn:active { transform: scale(0.92); }
        .btn-text { font-size: 1.5rem; line-height: 1.4; }
        .btn-subtext { font-size: 0.9rem; opacity: 0.8; }
        .btn-counter {
            position: absolute;
            top: -10px; right: -10px;
            background: var(--accent);
            color: var(--bg-dark);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
        }
        .user-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 20px;
            padding: 20px;
        }
        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(45, 138, 110, 0.2);
        }
        .user-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 900;
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(45, 138, 110, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--accent));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .leaderboard-section { margin-bottom: 20px; }
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 15px;
            padding-right: 10px;
            border-right: 4px solid var(--accent);
        }
        .leaderboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        @media (min-width: 768px) {
            .leaderboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .leaderboard-card {
            background: rgba(15, 46, 34, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 138, 110, 0.2);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rank-badge {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #333; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: #333; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: white; }
        .rank-other { background: var(--bg-card); color: var(--text-secondary); border: 1px solid rgba(45, 138, 110, 0.3); }
        .leaderboard-count { font-size: 1.3rem; font-weight: 900; color: var(--accent); }
        .toast-container {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: rgba(15, 46, 34, 0.95);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            animation: toast-in 0.3s ease;
            pointer-events: all;
        }
        @keyframes toast-in {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal h2 { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; }
        .modal p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem; }
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(45, 138, 110, 0.3);
            border-radius: 12px;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            touch-action: manipulation;
        }
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10001;
        }
        .connection-online {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .connection-offline {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        .vibration-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--primary-light);
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vibration-btn.active { color: var(--accent); border-color: var(--accent); }
    </style>
<base target="_blank">
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="connection-status connection-offline" id="connectionStatus">
        <span id="statusText">جاري الاتصال...</span>
    </div>

    <div class="modal-overlay" id="setupModal">
        <div class="modal">
            <h2>🌙 أهلاً بك في تسبيح</h2>
            <p>أدخل اسمك لبدء رحلة الاستغفار</p>
            <div class="input-group">
                <input type="text" id="userNameInput" placeholder="اسمك" maxlength="20" autofocus>
            </div>
            <button class="btn-primary" id="startBtn">ابدأ الاستغفار</button>
        </div>
    </div>

    <button class="vibration-btn active" id="vibrationBtn">📳</button>

    <header class="header">
        <h1>تَسْبِيح</h1>
        <p>سَابِقُوا إِلَى مَغْفِرَةٍ مِنْ رَبِّكُمْ</p>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">📿 استغفار اليوم</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streakCount">0</div>
                <div class="stat-label">🔥 أيام متتالية</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">🏆 الإجمالي</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="globalCount">0</div>
                <div class="stat-label">🌍 العالم</div>
            </div>
        </div>

        <div class="main-section">
            <div class="button-container">
                <button class="astaghfir-btn" id="mainBtn">
                    <span class="btn-text">أَسْتَغْفِرُ<br>اللَّهَ</span>
                    <span class="btn-subtext">اضغط للاستغفار</span>
                    <span class="btn-counter" id="btnCounter">0</span>
                </button>
            </div>

            <div class="user-card">
                <div class="user-header">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <h3 id="userDisplayName">زائر</h3>
                        <p>المستوى: <span id="userLevel">مبتدئ</span></p>
                    </div>
                </div>
                <div class="progress-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem;">
                        <span>تقدم اليوم</span>
                        <span id="progressText">0 / 100</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
                <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div style="text-align: center; padding: 10px; background: rgba(45, 138, 110, 0.1); border-radius: 10px;">
                        <div style="font-size: 1.3rem; font-weight: 900; color: var(--accent);" id="hourlyRate">0</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">في الساعة</div>
                    </div>
                    <div style="text-align: center; padding: 10px; background: rgba(45, 138, 110, 0.1); border-radius: 10px;">
                        <div style="font-size: 1.3rem; font-weight: 900; color: var(--accent);" id="rankPosition">-</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">ترتيبك</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="leaderboard-section">
            <h2 class="section-title">🏆 لوحة المتصدرين - مباشر</h2>
            <div class="leaderboard-grid" id="leaderboard"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIG - Replace this with your jsonstorage URL after first run
        // ============================================
        var STORAGE_URL = localStorage.getItem('tasbihStorageUrl') || null;

        var currentUser = null;
        var users = [];
        var vibrationEnabled = true;
        var isOnline = false;
        var syncInterval = null;

        var levels = [
            { name: 'مبتدئ', min: 0 },
            { name: 'مُكثر', min: 100 },
            { name: 'مُجتهد', min: 500 },
            { name: 'مُحب', min: 1000 },
            { name: 'مُتقن', min: 5000 },
            { name: 'وَرِع', min: 10000 },
            { name: 'صالح', min: 50000 },
            { name: 'مُتقِي', min: 100000 }
        ];

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            createParticles();
            setupEventListeners();

            // Try to load from localStorage first
            var saved = localStorage.getItem('tasbihUser');
            if (saved) {
                currentUser = JSON.parse(saved);
            }

            // If we have a storage URL, try to sync
            if (STORAGE_URL) {
                syncData();
                syncInterval = setInterval(syncData, 3000); // Sync every 3 seconds
            } else {
                // First time - create storage
                createStorage();
            }

            if (!currentUser) {
                document.getElementById('setupModal').style.display = 'flex';
            } else {
                document.getElementById('setupModal').style.display = 'none';
                updateUI();
            }
        }

        function setupEventListeners() {
            document.getElementById('startBtn').addEventListener('click', setupUser);
            document.getElementById('mainBtn').addEventListener('click', addTasbih);
            document.getElementById('mainBtn').addEventListener('touchstart', function(e) { e.preventDefault(); addTasbih(); });

            document.getElementById('userNameInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') setupUser();
            });

            document.getElementById('vibrationBtn').addEventListener('click', function() {
                vibrationEnabled = !vibrationEnabled;
                document.getElementById('vibrationBtn').classList.toggle('active', vibrationEnabled);
                showToast(vibrationEnabled ? '✅ الاهتزاز مفعل' : '❌ الاهتزاز معطل');
            });

            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' && !e.repeat && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    addTasbih();
                }
            });
        }

        // ============================================
        // JSONSTORAGE API
        // ============================================
        async function createStorage() {
            try {
                // Create initial data
                var initialData = {
                    users: [],
                    lastUpdated: new Date().toISOString()
                };

                var response = await fetch('https://api.jsonstorage.net/v1/json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(initialData)
                });

                if (response.ok) {
                    var result = await response.json();
                    STORAGE_URL = result.uri;
                    localStorage.setItem('tasbihStorageUrl', STORAGE_URL);
                    console.log('Storage created:', STORAGE_URL);
                    showToast('✅ تم إنشاء قاعدة البيانات');
                    syncInterval = setInterval(syncData, 3000);
                }
            } catch(e) {
                console.error('Create storage error:', e);
                showToast('⚠️ وضع عدم الاتصال');
                setupOfflineMode();
            }
        }

        async function syncData() {
            if (!STORAGE_URL) return;

            try {
                // Get data from server
                var response = await fetch(STORAGE_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Fetch failed');

                var data = await response.json();
                users = data.users || [];

                // Update current user from server data
                if (currentUser) {
                    var serverUser = users.find(function(u) { return u.id === currentUser.id; });
                    if (serverUser) {
                        // Merge: keep higher counts
                        currentUser.today_count = Math.max(currentUser.today_count || 0, serverUser.today_count || 0);
                        currentUser.total_count = Math.max(currentUser.total_count || 0, serverUser.total_count || 0);
                    }
                }

                isOnline = true;
                updateConnectionStatus(true);
                updateGlobalCount();
                renderLeaderboard();

                if (currentUser) updateUI();

            } catch(e) {
                console.log('Sync error:', e);
                isOnline = false;
                updateConnectionStatus(false);
            }
        }

        async function saveToServer() {
            if (!STORAGE_URL || !currentUser) return;

            try {
                // Update or add current user
                var userIndex = users.findIndex(function(u) { return u.id === currentUser.id; });
                if (userIndex >= 0) {
                    users[userIndex] = currentUser;
                } else {
                    users.push(currentUser);
                }

                var data = {
                    users: users,
                    lastUpdated: new Date().toISOString()
                };

                var response = await fetch(STORAGE_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    isOnline = true;
                    updateConnectionStatus(true);
                }
            } catch(e) {
                console.error('Save error:', e);
                isOnline = false;
                updateConnectionStatus(false);
            }
        }

        // ============================================
        // USER MANAGEMENT
        // ============================================
        async function setupUser() {
            var name = document.getElementById('userNameInput').value.trim();
            if (!name) {
                showToast('❌ الرجاء إدخال اسمك');
                return;
            }

            currentUser = {
                id: 'user_' + Date.now(),
                name: name,
                today_count: 0,
                total_count: 0,
                streak: 1,
                last_date: new Date().toDateString(),
                hourly_count: 0,
                last_hour: new Date().getHours(),
                trend: 'up'
            };

            // Save locally
            localStorage.setItem('tasbihUser', JSON.stringify(currentUser));

            // Save to server
            await saveToServer();

            document.getElementById('setupModal').style.display = 'none';
            updateUI();
            showToast('🌟 أهلاً ' + name + '! ابدأ رحلة الاستغفار');
        }

        async function addTasbih() {
            if (!currentUser) {
                document.getElementById('setupModal').style.display = 'flex';
                return;
            }

            // Vibration
            if (vibrationEnabled && navigator.vibrate) {
                navigator.vibrate(15);
            }

            // Update counts
            currentUser.today_count = (currentUser.today_count || 0) + 1;
            currentUser.total_count = (currentUser.total_count || 0) + 1;
            currentUser.hourly_count = (currentUser.hourly_count || 0) + 1;

            // Save locally
            localStorage.setItem('tasbihUser', JSON.stringify(currentUser));

            // Save to server
            await saveToServer();

            // Update UI
            updateUI();
            document.getElementById('btnCounter').textContent = currentUser.today_count;

            // Milestones
            if (currentUser.today_count % 10 === 0) {
                var messages = ['🎉 أحسنت! 10 استغفارات','💪 استمر! أنت مُجتهد','✨ بارك الله فيك','🌟 تقترب من الهدف!','🔥 رائع! واصل التقدم'];
                showToast(messages[Math.floor(Math.random() * messages.length)]);
                if (vibrationEnabled && navigator.vibrate) {
                    navigator.vibrate([30, 50, 30]);
                }
            }
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function updateUI() {
            if (!currentUser) return;

            document.getElementById('todayCount').textContent = currentUser.today_count || 0;
            document.getElementById('streakCount').textContent = currentUser.streak || 1;
            document.getElementById('totalCount').textContent = (currentUser.total_count || 0).toLocaleString();
            document.getElementById('btnCounter').textContent = currentUser.today_count || 0;
            document.getElementById('userDisplayName').textContent = currentUser.name;
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);

            var level = levels[0];
            for (var i = levels.length - 1; i >= 0; i--) {
                if ((currentUser.total_count || 0) >= levels[i].min) {
                    level = levels[i];
                    break;
                }
            }
            document.getElementById('userLevel').textContent = level.name;

            var progress = Math.min(((currentUser.today_count || 0) / 100) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = (currentUser.today_count || 0) + ' / 100';
            document.getElementById('hourlyRate').textContent = currentUser.hourly_count || 0;

            var rank = -1;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === currentUser.id) {
                    rank = i + 1;
                    break;
                }
            }
            document.getElementById('rankPosition').textContent = rank > 0 ? '#' + rank : '-';
        }

        function renderLeaderboard() {
            var container = document.getElementById('leaderboard');
            container.innerHTML = '';

            var sorted = users.slice().sort(function(a, b) {
                return (b.today_count || 0) - (a.today_count || 0);
            });

            for (var i = 0; i < Math.min(sorted.length, 10); i++) {
                var user = sorted[i];
                var rank = i + 1;
                var rankClass = 'rank-other';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                var isCurrent = currentUser && user.id === currentUser.id;

                var card = document.createElement('div');
                card.className = 'leaderboard-card';
                if (isCurrent) card.style.border = '2px solid var(--accent)';

                card.innerHTML = '<div class="rank-badge ' + rankClass + '">' + rank + '</div>' +
                    '<div style="flex:1;">' +
                    '<div style="font-weight:700; font-size:1rem;">' + user.name + (isCurrent ? ' 👤' : '') + '</div>' +
                    '<div style="color:var(--text-muted); font-size:0.8rem;">' +
                    '<span>🔥 ' + (user.streak || 1) + ' يوم</span>' +
                    '</div></div>' +
                    '<div style="text-align:center;">' +
                    '<div class="leaderboard-count">' + (user.today_count || 0) + '</div>' +
                    '<span style="font-size:0.75rem;">' + ((user.trend || 'up') === 'up' ? '📈' : '📉') + '</span>' +
                    '</div>';
                container.appendChild(card);
            }
        }

        function updateGlobalCount() {
            var total = users.reduce(function(sum, u) { return sum + (u.today_count || 0); }, 0);
            document.getElementById('globalCount').textContent = total.toLocaleString();
        }

        function updateConnectionStatus(online) {
            var el = document.getElementById('connectionStatus');
            var text = document.getElementById('statusText');
            if (online) {
                el.className = 'connection-status connection-online';
                text.textContent = 'متصل';
            } else {
                el.className = 'connection-status connection-offline';
                text.textContent = 'غير متصل';
            }
        }

        function setupOfflineMode() {
            var arabicNames = ['أحمد','محمد','علي','عمر','خالد','فهد','سعد','ناصر','عبدالله','سلطان'];
            users = arabicNames.map(function(name, i) {
                return {
                    id: 'fake_' + i,
                    name: name,
                    today_count: Math.floor(Math.random() * 500) + 50,
                    total_count: Math.floor(Math.random() * 50000) + 1000,
                    streak: Math.floor(Math.random() * 30) + 1,
                    trend: Math.random() > 0.3 ? 'up' : 'down'
                };
            }).sort(function(a, b) { return b.today_count - a.today_count; });
            updateGlobalCount();
            renderLeaderboard();
        }

        // ============================================
        // UTILITIES
        // ============================================
        function createParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 20; i++) {
                var particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(particle);
            }
        }

        function showToast(message) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
